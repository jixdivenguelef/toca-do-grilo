<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toca do Grilo — Kiosk</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --red: #e81c1c;
            --red-dark: #b81010;
            --cream: #fff8f0;
            --warm: #fff3e0;
            --text: #1a1a1a;
            --muted: #888;
            --border: #f0e0d0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            /* CORRIGIDO: removido overflow:hidden e align-items:center para permitir scroll no PC */
            display: flex;
            justify-content: center;
            padding: 40px 16px;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(232,28,28,0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -150px; left: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(232,28,28,0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .page {
            width: 100%;
            max-width: 460px;
            animation: fadeUp 0.5s ease forwards;
            /* CORRIGIDO: altura automática, não forçada */
            height: fit-content;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-wrap {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-wrap img {
            height: 100px;
            width: auto;
            filter: drop-shadow(0 4px 12px rgba(232,28,28,0.2));
        }
        .logo-wrap .brand {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 36px 32px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.08), 0 2px 8px rgba(232,28,28,0.06);
            border: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            background: var(--warm);
            border-radius: 14px;
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 11px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: white;
            color: var(--red);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .tipo-wrap {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tipo-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid var(--border);
            border-radius: 14px;
            background: white;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .tipo-btn i { font-size: 1.4rem; }
        .tipo-btn.active {
            border-color: var(--red);
            color: var(--red);
            background: #fff5f5;
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            color: var(--text);
            background: white;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--red);
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 16px rgba(232,28,28,0.3);
            display: block; /* garante que ocupa a linha toda */
        }
        .btn-main:hover {
            background: var(--red-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(232,28,28,0.35);
        }
        .btn-main:active { transform: translateY(0); }
        .btn-main:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .msg {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: none;
        }
        .msg.error { background: #fff0f0; color: var(--red); border: 1px solid #ffd0d0; display: block; }
        .msg.success { background: #f0fff4; color: #1a7a3a; border: 1px solid #c0f0d0; display: block; }

        .divider {
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 700;
            margin-top: 16px;
        }

        .section { display: none; }
        .section.visible { display: block; }

        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.visible { display: block; }

        .dashboard h2 {
            font-family: 'Syne', sans-serif;
            color: var(--red);
            font-size: 1.6rem;
            margin-bottom: 8px;
            text-align: center;
        }
        .dashboard p {
            color: var(--muted);
            margin-bottom: 12px;
            font-weight: 600;
            text-align: center;
        }

        /* ID card do utilizador */
        .id-card {
            background: linear-gradient(135deg, var(--red) 0%, var(--red-dark) 100%);
            border-radius: 18px;
            padding: 20px 24px;
            color: white;
            margin: 16px 0 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 6px 20px rgba(232,28,28,0.3);
        }
        .id-avatar {
            width: 54px;
            height: 54px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
        }
        .id-info { flex: 1; }
        .id-nome {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 0.3px;
        }
        .id-tipo {
            font-size: 0.78rem;
            opacity: 0.85;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .id-numero {
            text-align: right;
        }
        .id-numero .label {
            font-size: 0.7rem;
            opacity: 0.75;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .id-numero .num {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            letter-spacing: 1px;
        }

        .badge {
            display: inline-block;
            background: #fff5f5;
            color: var(--red);
            border: 2px solid var(--red);
            border-radius: 20px;
            padding: 4px 16px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-logout {
            width: 100%;
            margin-top: 16px;
            padding: 12px;
            background: transparent;
            color: var(--red);
            border: 2px solid var(--red);
            border-radius: 14px;
            font-family: 'Outfit', sans-serif;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: var(--red); color: white; }

        @media (max-width: 480px) {
            .card { padding: 28px 20px; }
            body { padding: 24px 12px; }
        }
    </style>
</head>
<body>

<div class="page">
    <div class="logo-wrap">
        <img src="src/images/toca-do-grilo-logo.png" alt="Toca do Grilo" onerror="this.style.display='none'">
        <div class="brand">Kiosk — Cantina Escolar</div>
    </div>

    <!-- AUTH CARD -->
    <div class="card" id="auth_card">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('login')">Entrar</button>
            <button class="tab" onclick="switchTab('register')">Criar Conta</button>
        </div>

        <div class="msg" id="msg"></div>

        <!-- LOGIN -->
        <div class="section visible" id="section_login">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login_email" placeholder="o-teu@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login_password" placeholder="••••••••">
            </div>
            <button class="btn-main" onclick="doLogin()">Entrar</button>
            <button id="btn_recuperar" onclick="doRecuperarPassword()" style="background:none;border:none;color:var(--red);font-family:'Outfit',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;margin-top:12px;width:100%;text-align:center;padding:4px;">
                Esqueci a password
            </button>
        </div>

        <!-- REGISTO -->
        <div class="section" id="section_register">
            <div class="tipo-wrap">
                <button class="tipo-btn active" id="tipo_estudante" onclick="setTipo('estudante')">
                    <i class="fa-solid fa-id-card"></i>
                    Estudante
                </button>
                <button class="tipo-btn" id="tipo_pai" onclick="setTipo('pai')">
                    <i class="fa-solid fa-house-user"></i>
                    Pai / Encarregado
                </button>
            </div>

            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="reg_nome" placeholder="O teu nome">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg_email" placeholder="o-teu@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg_password" placeholder="Mínimo 6 caracteres">
            </div>

            <div class="form-group" id="campo_turma">
                <label>Turma / Ano</label>
                <input type="text" id="reg_turma" placeholder="Ex: 10ª A">
            </div>

            <div class="form-group" id="campo_filho" style="display:none">
                <label>Nome do(s) filho(s)</label>
                <input type="text" id="reg_filho" placeholder="Ex: João Silva">
            </div>

            <button class="btn-main" id="btn_register" onclick="doRegister()">Criar Conta</button>
            <div class="divider">Já tens conta? Clica em "Entrar"</div>
        </div>
    </div>

    <!-- DASHBOARD após login -->
    <div class="card dashboard" id="dashboard">
        <h2>Bem-vindo! 👋</h2>
        <p id="dash_sub">Aqui está o teu cartão de identificação</p>

        <div class="id-card">
            <div class="id-avatar" id="dash_avatar"><i class="fa-solid fa-id-card"></i></div>
            <div class="id-info">
                <div class="id-nome" id="dash_nome">—</div>
                <div class="id-tipo" id="dash_tipo">—</div>
            </div>
            <div class="id-numero">
                <div class="label">ID</div>
                <div class="num" id="dash_id">#—</div>
            </div>
        </div>

        <p style="color:#aaa; font-size:0.82rem; text-align:center;">Guarda este ID — é usado para identificação nas encomendas</p>

        <button class="btn-logout" onclick="doLogout()">Sair da conta</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ijfcydzonjfnpttgdifa.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlqZmN5ZHpvbmpmbnB0dGdkaWZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MTE5NzIsImV4cCI6MjA5NTQ4Nzk3Mn0.ZiY1uldEwz3ykn5_ZBxJmL60tTJV8-tOFVcdMZd4Io8';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let tipoAtual = 'estudante';

    // Gera um ID de 4 dígitos baseado no timestamp + random
    function gerarID() {
        return Math.floor(1000 + Math.random() * 9000).toString();
    }

    sb.auth.getSession().then(({ data }) => {
        if (data.session) loadDashboard(data.session.user);
    });

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
        });
        document.getElementById('section_login').classList.toggle('visible', tab === 'login');
        document.getElementById('section_register').classList.toggle('visible', tab === 'register');
        clearMsg();
    }

    function setTipo(tipo) {
        tipoAtual = tipo;
        document.getElementById('tipo_estudante').classList.toggle('active', tipo === 'estudante');
        document.getElementById('tipo_pai').classList.toggle('active', tipo === 'pai');
        document.getElementById('campo_turma').style.display = tipo === 'estudante' ? 'block' : 'none';
        document.getElementById('campo_filho').style.display = tipo === 'pai' ? 'block' : 'none';
    }

    function showMsg(text, type) {
        const el = document.getElementById('msg');
        el.textContent = text;
        el.className = 'msg ' + type;
    }

    function clearMsg() {
        document.getElementById('msg').className = 'msg';
    }

    async function doLogin() {
        const email = document.getElementById('login_email').value.trim();
        const password = document.getElementById('login_password').value;
        if (!email || !password) return showMsg('Preenche todos os campos!', 'error');

        const btn = document.querySelector('#section_login .btn-main');
        btn.disabled = true; btn.textContent = 'A entrar...';

        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        btn.disabled = false; btn.textContent = 'Entrar';
        if (error) return showMsg('Email ou password incorretos.', 'error');

        // Redirecionar para o site após login
        window.location.href = 'index.html';
    }

    async function doRecuperarPassword() {
        const email = document.getElementById('login_email').value.trim();
        if (!email) return showMsg('Escreve o teu email primeiro!', 'error');

        const btn = document.getElementById('btn_recuperar');
        btn.disabled = true; btn.textContent = 'A enviar...';

        const { error } = await sb.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/login.html'
        });

        btn.disabled = false; btn.textContent = 'Esqueci a password';
        if (error) return showMsg('Erro ao enviar email. Verifica o endereço.', 'error');
        showMsg('Email enviado! Verifica a tua caixa de correio.', 'success');
    }

    async function doRegister() {
        const nome = document.getElementById('reg_nome').value.trim();
        const email = document.getElementById('reg_email').value.trim();
        const password = document.getElementById('reg_password').value;

        if (!nome || !email || !password) return showMsg('Preenche todos os campos!', 'error');
        if (password.length < 6) return showMsg('A password deve ter pelo menos 6 caracteres.', 'error');

        const btn = document.getElementById('btn_register');
        btn.disabled = true; btn.textContent = 'A criar conta...';

        const userID = gerarID();

        const metadata = {
            nome,
            tipo: tipoAtual,
            user_id: userID,
            turma: tipoAtual === 'estudante' ? document.getElementById('reg_turma').value.trim() : null,
            filhos: tipoAtual === 'pai' ? document.getElementById('reg_filho').value.trim() : null,
        };

        const { data, error } = await sb.auth.signUp({
            email, password,
            options: { data: metadata }
        });

        btn.disabled = false; btn.textContent = 'Criar Conta';

        if (error) return showMsg(error.message, 'error');

        // Login automático após registo e redirecionar
        if (data.user) {
            window.location.href = 'index.html';
        } else {
            showMsg('Conta criada! Faz login para entrar.', 'success');
        }
    }

    async function doLogout() {
        await sb.auth.signOut();
        document.getElementById('auth_card').style.display = 'block';
        document.getElementById('dashboard').classList.remove('visible');
    }

    function loadDashboard(user) {
        document.getElementById('auth_card').style.display = 'none';
        const dash = document.getElementById('dashboard');
        dash.classList.add('visible');

        const meta = user.user_metadata || {};
        const tipo = meta.tipo || 'estudante';
        const id = meta.user_id || '????';

        document.getElementById('dash_nome').textContent = meta.nome || user.email;
        document.getElementById('dash_tipo').textContent = tipo === 'pai' ? 'Pai / Encarregado' : 'Estudante';
        document.getElementById('dash_avatar').innerHTML = tipo === 'pai' ? '<i class="fa-solid fa-house-user"></i>' : '<i class="fa-solid fa-id-card"></i>';
        document.getElementById('dash_id').textContent = '#' + id;
    }
</script>
</body>
</html>
